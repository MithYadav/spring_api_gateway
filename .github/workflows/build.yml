name: Java CI/CD with Spring Boot and AWS Lambda

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Deploy to Lambda
      run: |
        aws lambda update-function-code \
          --function-name simple-lambda-projects \
          --zip-file fileb://target/lambda-app.jar

    - name: Wait for Lambda to be Active
      run: |
        aws lambda wait function-updated --function-name simple-lambda-projects
        sleep 5

    - name: Update Lambda Configuration (Handler)
      run: |
        aws lambda update-function-configuration \
          --function-name simple-lambda-projects \
          --handler com.example.test.StreamLambdaHandler::handleRequest
